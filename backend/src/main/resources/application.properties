spring.application.name=erpMini

# Use H2 in-memory DB by default (easy dev/demo). Switch to postgres via profile.
spring.datasource.url=jdbc:h2:mem:minierpdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=miniERP_Super_Secret_Key_2024_ShivFurnitureWorks_Hackathon_Winner
jwt.expiration=86400000

# Server
server.port=8080

# CORS
cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://localhost:3000

# Logging
logging.level.com.minierp=INFO

# Jackson settings to prevent ByteBuddy / Hibernate proxy serialization issues
spring.jackson.serialization.fail-on-empty-beans=false

